name: Hlídač nemovitostí

on:
  schedule:
    - cron: "*/30 * * * *"   # každých 30 minut
  workflow_dispatch:           # možnost spustit ručně

jobs:
  hlidac:
    runs-on: ubuntu-latest

    steps:
      - name: Stáhni kód
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Nainstaluj závislosti
        run: pip install requests

      - name: Spusť hlídač
        env:
          EMAIL_ADRESA: ${{ secrets.EMAIL_ADRESA }}
          EMAIL_HESLO: ${{ secrets.EMAIL_HESLO }}
        run: python hlidac.py

      - name: Ulož seznam viděných inzerátů
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add videne_inzeraty.json || true
          git diff --staged --quiet || git commit -m "Aktualizace viděných inzerátů"
          git push || true
